name: Generate GPG Key and Output to Logs

on:
  workflow_dispatch:

jobs:
  generate-key:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GPG key
        run: |
          cat >gen-key-script <<EOF
          %no-protection
          Key-Type: RSA
          Key-Length: 2048
          Subkey-Type: RSA
          Subkey-Length: 2048
          Name-Real: GitHub Actions Bot
          Name-Email: actions@github.com
          Expire-Date: 0
          %commit
          EOF
          gpg --batch --generate-key gen-key-script

          echo "=== PRIVATE KEY ==="
          gpg --armor --export-secret-keys
          echo "=== END PRIVATE KEY ==="

          echo "=== PUBLIC KEY ==="
          gpg --armor --export
          echo "=== END PUBLIC KEY ==="
