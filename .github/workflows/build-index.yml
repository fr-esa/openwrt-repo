name: Build OpenWrt Package Index

on:
  push:
    paths:
      - 'packages/*.ipk'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make python3 gzip

      - name: Install opkg-utils from OpenWrt source
        run: |
          git clone https://git.openwrt.org/project/opkg-utils.git
          cd opkg-utils
          sudo make install
          opkg-make-index --help

      - name: Build Packages index
        working-directory: packages
        run: |
          opk
