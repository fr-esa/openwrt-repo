name: Build OpenWrt Package Index

on:
  push:
    paths:
      - 'packages/*.ipk'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential python3 gzip libncurses5-dev zlib1g-dev libssl-dev

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 --branch=openwrt-24.10 https://github.com/openwrt/openwrt.git openwrt-src

      - name: Build opkg-make-index
        working-directory: openwrt-src
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make tools/opkg/compile V=s
          cp bin/host/opkg-make-index /usr/local/bin/

      - name: Build Packages index
        working-directory: packages
        run: |
          opkg-make-index . > Packages
          gzip -k Packages

      - name: Commit and push updated index
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add packages/Packages*
          git commit -m "Update package index" || echo "No changes to commit"
          git push
