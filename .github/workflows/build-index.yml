name: Build OpenWrt Package Index

on:
  push:
    paths:
      - 'packages/*.ipk'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip gzip git

      - name: Download opkg-utils via ZIP
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip gzip
          curl -L -o opkg.zip https://github.com/openwrt/opkg/archive/refs/heads/master.zip
          unzip opkg.zip
          sudo cp opkg-master/utils/opkg-make-index opkg-master/utils/opkg-sign-index /usr/local/bin/
          sudo chmod +x /usr/local/bin/opkg-make-index /usr/local/bin/opkg-sign-index

      - name: Build Packages index
        working-directory: packages
        run: |
          opkg-make-index . > Packages
          gzip -k Packages

