name: Build OpenWrt Package Index

on:
  push:
    paths:
      - 'packages/*.ipk'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget make python3 gzip

      - name: Download and install opkg-make-index from OpenWrt SDK 24.10.4
        run: |
          wget https://downloads.openwrt.org/releases/24.10.4/targets/x86/64/openwrt-sdk-24.10.4-x86-64_gcc-13.2.1_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-24.10.4-x86-64_gcc-13.2.1_musl.Linux-x86_64.tar.xz
          cd openwrt-sdk-24.10.4-x86-64_gcc-13.2.1_musl.Linux-x86_64
          sudo cp staging_dir/host/bin/opkg-make-index /usr/local/bin/

      - name: Build Packages index
        working-directory: packages
