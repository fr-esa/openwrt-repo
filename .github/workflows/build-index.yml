name: Build OpenWrt Package Index

on:
  push:
    paths:
      - 'packages/*.ipk'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make python3 gzip

      - name: Install opkg-utils from OpenWrt source
        run: |
          git clone https://git.openwrt.org/project/opkg-lede.git
          cd opkg-lede/opkg-utils
          sudo make install
          opkg-make-index --help

      - name: Build Packages index
        working-directory: packages
        run: |
          opkg-make-index . > Packages
          gzip -k Packages

      - name: Commit and push updated index
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add packages/Packages*
          git commit -m "Update package index" || echo "No changes to commit"
          git push
