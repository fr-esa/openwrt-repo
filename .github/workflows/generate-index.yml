name: Generate OpenWrt Package Index

on:
  push:
    paths:
      - 'packages/**'

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Run opkg-make-index in Docker
      run: |
        docker run --rm -v $PWD/packages:/packages openwrtorg/sdk:24.10.4 /bin/sh -c "
          opkg-make-index /packages > /packages/Packages && gzip -f -k /packages/Packages
        "
      
    - name: Commit Packages index
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add packages/Packages packages/Packages.gz
        git commit -m "Update Packages index" || echo "No changes"
        git push
