name: Build OpenWrt Packages Index

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build usign from source
        run: |
          git clone https://github.com/openwrt/usign.git
          cd usign
          mkdir build
          cd build
          cmake ..
          make
          make install

      - name: Build Packages index
        run: |
          cd packages
          rm packages/Packages packages/Packages.*
          for f in *.ipk; do
            echo "Generating entry for $f"
            tar -Oxzf "$f" ./control.tar.gz | tar -xzOf - ./control >> Packages
            echo "" >> Packages
            echo "Filename: $f" >> Packages
            echo "Size: $(stat -c%s "$f")" >> Packages
            echo "MD5Sum: $(md5sum "$f" | cut -d' ' -f1)" >> Packages
            echo "SHA256sum: $(sha256sum "$f" | cut -d' ' -f1)" >> Packages
            echo "" >> Packages
          done
          gzip -9c Packages > Packages.gz
          cp Packages Packages.manifest
          
      - name: Setup usign private key
        env:
          USIGN_PRIV_B64: ${{ secrets.USIGN_PRIV_B64 }}
        run: |
          cd packages
          echo "$USIGN_PRIV_B64" | base64 -d > usign.key
          chmod 600 usign.key
          
      - name: Sign Packages.gz index with usign
        run: |
          cd packages
          cat usign.key
          usign -S -m Packages.gz -s usign.key -x Packages.sig

      - name: Commit and push index and signature
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/Packages* 
          git commit -m "Update package index and signature" || echo "No changes to commit"
          git push
