name: Build OpenWrt Packages Index

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install coreutils (sha256sum)
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils

      - name: Fix sha256 command
        run: |
          sudo ln -sf $(which sha256sum) /usr/local/bin/sha256

      - name: Build usign from source
        run: |
          git clone https://github.com/openwrt/usign.git
          cd usign
          mkdir build
          cd build
          cmake ..
          make
          sudo make install

      - name: Build Packages index
        run: |
          cd packages
          rm -f Packages Packages.gz Packages.sig

          cat > ipkg-make-index.sh <<'EOF'
#!/usr/bin/env bash
set -e

pkg_dir=$1

if [ -z "$pkg_dir" ] || [ ! -d "$pkg_dir" ]; then
    echo "Usage: ipkg-make-index <package_directory>" >&2
    exit 1
fi

empty=1

for pkg in $(find "$pkg_dir" -name '*.ipk' | sort); do
    empty=

    name="${pkg##*/}"
    name="${name%%_*}"
    [[ "$name" == "kernel" ]] && continue
    [[ "$name" == "libc" ]] && continue

    echo "Generating index for package $pkg" >&2

    file_size=$(stat -L -c%s "$pkg")
    sha256sum=$(sha256sum "$pkg" | cut -d ' ' -f1)

    sed_safe_pkg=$(echo "$pkg" | sed 's/^\.\///; s/\//\\\//g')

    tmpfile=$(mktemp)
    tar -Oxzf "$pkg" control.tar.gz > "$tmpfile"
    tar -xOzf "$tmpfile" control | sed -e "s|^Description:|Filename: $sed_safe_pkg\nSize: $file_size\nSHA256sum: $sha256sum\nDescription:|"
    echo ""
    rm "$tmpfile"
done

[ -n "$empty" ] && echo
exit 0
EOF

          chmod +x ipkg-make-index.sh
          ./ipkg-make-index.sh . > Packages
          gzip -9c Packages > Packages.gz

      - name: Setup usign private key
        env:
          USIGN_PRIV_B64: ${{ secrets.USIGN_PRIV_B64 }}
        run: |
          cd packages
          echo "$USIGN_PRIV_B64" | base64 -d > usign.key
          chmod 600 usign.key

      - name: Sign Packages index with usign
        run: |
          cd packages
          usign -S -m Packages -s usign.key -x Packages.sig

      - name: Commit and push index and signature
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/Packages*
          git commit -m "Update package index and signature" || echo "No changes to commit"
          git push
