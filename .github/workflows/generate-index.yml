name: Build Package Index

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gzip

      - name: Install opkg-utils
        run: |
          sudo apt-get update
          sudo apt-get install -y opkg-utils

      - name: Generate Packages index for each architecture
        run: |
          set -e
          cd packages
          for arch_dir in */; do
            if [ -d "$arch_dir" ]; then
              echo "Processing architecture: $arch_dir"
              cd "$arch_dir"
              rm -f Packages Packages.gz
              opkg-make-index . > Packages
              gzip -c Packages > Packages.gz
              cd ..
            fi
          done

      - name: Commit and push index files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add packages/*/Packages*
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Packages index" && git push)
