name: Build Package Index

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Perl, gzip, curl
        run: |
          sudo apt-get update
          sudo apt-get install -y perl gzip curl

      - name: Download opkg-make-index script from OpenWrt master
        run: |
          mkdir -p /tmp/opkg-tools
          curl -fsSL https://raw.githubusercontent.com/openwrt/openwrt/refs/heads/main/scripts/ipkg-make-index.sh \
            -o /tmp/opkg-tools/opkg-make-index
          chmod +x /tmp/opkg-tools/opkg-make-index

      - name: Patch opkg-make-index for sha256sum
        run: |
          sed -i 's#sha256 #sha256sum #g' /tmp/opkg-tools/opkg-make-index

      - name: Generate Packages index in packages/
        run: |
          cd packages
          rm -f Packages Packages.gz
          /tmp/opkg-tools/opkg-make-index . > Packages
          gzip -c Packages > Packages.gz
          ls -l Packages Packages.gz

      - name: Commit and push index files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          cd packages
          git add Packages Packages.gz
          if ! git diff --quiet && ! git diff --staged --quiet; then
            git commit -m "Auto-update Packages index"
            git push origin main
          else
            echo "No changes detected"
          fi
