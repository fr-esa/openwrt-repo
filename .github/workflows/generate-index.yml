name: Build Package Index

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Perl and gzip
        run: |
          sudo apt-get update
          sudo apt-get install -y perl gzip

      - name: Download opkg-make-index script from OpenWrt master
        run: |
          mkdir -p /tmp/opkg-tools
          curl -fsSL https://raw.githubusercontent.com/openwrt/openwrt/refs/heads/main/scripts/ipkg-make-index.sh \
            -o /tmp/opkg-tools/opkg-make-index
          chmod +x /tmp/opkg-tools/opkg-make-index

      - name: Generate Packages index for each architecture
        run: |
          set -e
          cd packages
          for arch_dir in */; do
            if [ -d "$arch_dir" ]; then
              echo "Processing architecture: $arch_dir"
              cd "$arch_dir"
              rm -f Packages Packages.gz
              /tmp/opkg-tools/opkg-make-index . > Packages
              gzip -c Packages > Packages.gz
              cd ..
            fi
          done

      - name: Commit and push index files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add packages/*/Packages*
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Packages index" && git push)
