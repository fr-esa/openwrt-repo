name: Build OpenWrt Packages Index

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "Imported keys:"
          gpg --list-secret-keys --keyid-format=long
          # Сохраняем fingerprint для использования при подписи
          FINGERPRINT=$(gpg --list-secret-keys --keyid-format=long | grep -Eo '[A-F0-9]{40}' | head -n1)
          echo "FINGERPRINT=$FINGERPRINT" >> $GITHUB_ENV

      - name: Build Packages index
        run: |
          cd packages
          rm -f Packages Packages.gz Packages.manifest Packages.sig
          for f in *.ipk; do
            echo "Generating entry for $f"
            tar -Oxzf "$f" ./control.tar.gz | tar -xzOf - ./control >> Packages
            echo "" >> Packages
            echo "Filename: $f" >> Packages
            echo "Size: $(stat -c%s "$f")" >> Packages
            echo "MD5Sum: $(md5sum "$f" | cut -d' ' -f1)" >> Packages
            echo "SHA256sum: $(sha256sum "$f" | cut -d' ' -f1)" >> Packages
            echo "" >> Packages
          done
          gzip -9c Packages > Packages.gz
          cp Packages Packages.manifest

      - name: Sign Packages index
        env:
          FINGERPRINT: ${{ env.FINGERPRINT }}
        run: |
          cd packages
          # --batch и --yes отключают интерактивность, --local-user указывает явный ключ
          gpg --batch --yes --pinentry-mode loopback --local-user "$FINGERPRINT" --detach-sign --armor -o Packages.sig Packages
          echo "Signature created with key $FINGERPRINT"

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/Packages*
          git commit -m "Update package index and signature" || echo "No changes to commit"
          git push
