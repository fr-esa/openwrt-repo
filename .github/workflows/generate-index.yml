name: Build OpenWrt Packages Index with usign

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git

      - name: Build usign from source
        run: |
          git clone https://github.com/openwrt/usign.git
          cd usign
          mkdir build
          cd build
          cmake ..
          make
          make install

      - name: Prepare usign private key
        env:
          USIGN_KEY: ${{ secrets.USIGN_KEY }}
        run: |
          echo "$USIGN_KEY" | base64 -d > packages/usign.key
          chmod 600 packages/usign.key

      - name: Build Packages index
        run: |
          cd packages
          rm -f Packages Packages.gz Packages.manifest Packages.sig
          for f in *.ipk; do
            echo "Generating entry for $f"
            tar -Oxzf "$f" ./control.tar.gz | tar -xzOf - ./control >> Packages
            echo "" >> Packages
            echo "Filename: $f" >> Packages
            echo "Size: $(stat -c%s "$f")" >> Packages
            echo "MD5Sum: $(md5sum "$f" | cut -d' ' -f1)" >> Packages
            echo "SHA256sum: $(sha256sum "$f" | cut -d' ' -f1)" >> Packages
            echo "" >> Packages
          done
          gzip -9c Packages > Packages.gz
          cp Packages Packages.manifest

      - name: Sign Packages.gz index with usign
        run: |
          cd packages
          usign -S -m Packages.gz -s usign.key -S Packages.sig
          ls -l Packages.sig
          head -c 100 Packages.sig | base64

      - name: Commit and push index and signature
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/Packages* 
          git commit -m "Update package index and signature" || echo "No changes to commit"
          git push
