name: Build OpenWrt Packages Index

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-keys

      - name: Build Packages index
        run: |
          cd packages
          rm -f Packages Packages.gz Packages.manifest Packages.sig
          for f in *.ipk; do
            echo "Generating entry for $f"
            tar -Oxzf "$f" ./control.tar.gz | tar -xzOf - ./control >> Packages
            echo "" >> Packages
            echo "Filename: $f" >> Packages
            echo "Size: $(stat -c%s "$f")" >> Packages
            echo "MD5Sum: $(md5sum "$f" | cut -d' ' -f1)" >> Packages
            echo "SHA256sum: $(sha256sum "$f" | cut -d' ' -f1)" >> Packages
            echo "" >> Packages
          done
          gzip -9c Packages > Packages.gz
          cp Packages Packages.manifest

      - name: Sign Packages index
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          cd packages
          gpg --batch --yes --pinentry-mode loopback --passphrase "" \
              --detach-sign --armor -u "${GPG_KEY_ID}" -o Packages.sig Packages

      - na
