name: Build OpenWrt Packages Index

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sha256sum (coreutils)
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils binutils

      - name: Fix sha256 command
        run: |
          sudo ln -s $(which sha256sum) /usr/local/bin/sha256

      - name: Build usign from source
        run: |
          git clone https://github.com/openwrt/usign.git
          cd usign
          mkdir build
          cd build
          cmake ..
          make
          sudo make install

      - name: Build Packages index
        run: |
          cd packages
          rm -f Packages Packages.gz Packages.sig
          chmod +x ipkg-make-index.sh
          ./ipkg-make-index.sh . > Packages
          
      - name: Setup usign private key
        env:
          USIGN_PRIV_B64: ${{ secrets.USIGN_PRIV_B64 }}
        run: |
          cd packages
          echo "$USIGN_PRIV_B64" | base64 -d > usign.key
          chmod 600 usign.key
          
      - name: Sign Packages index with usign
        run: |
          cd packages
          gzip -9n -c Packages > Packages.gz
          usign -S -m Packages.gz -s usign.key -x Packages.sig

      - name: Commit and push index and signature
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/Packages* 
          git commit -m "Update package index and signature" || echo "No changes to commit"
          git push -f
